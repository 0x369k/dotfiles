version: '3.8'
services:
  dev-environment:
    build:
      context: .devcontainer  # oder ein anderes Verzeichnis, das dein Dockerfile enthält
      dockerfile: Dockerfile  # Pfad relativ zum context
      args:
        BASE_IMAGE: "${BASE_IMAGE:-archlinux:latest}"
    image: "${IMAGE_NAME:-default-image-name}"
    volumes:
      - .:/home/developer:cached
      - ~/.ssh:/home/developer/.ssh:cached
    environment:
      - USER=developer
    working_dir: /home/developer
    stdin_open: true
    tty: true