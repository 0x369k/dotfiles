version: '3.8'
services:
  dev-environment:
    container_name: "{{CONTAINER_NAME}}"
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: "{{BASE_IMAGE}}"
    image: "{{IMAGE_NAME}}"
    volumes:
      - .:/home/developer:cached
      - ~/.ssh:/home/developer/.ssh:cached
    environment:
      - USER=developer
    working_dir: /home/developer
    stdin_open: true
    tty: true
