version: '3.8'
services:
  dev-environment:
    container_name: "${CONTAINER_NAME:-archlinux-dev-container}"
    image: "${IMAGE_NAME:-archlinux-dev:latest}"  # Nutze IMAGE_NAME oder Standardwert
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: "${BASE_IMAGE:-archlinux:latest}"  # Füge BASE_IMAGE als Build-Argument hinzu
    volumes:
      - .:/home/developer:cached
      - ~/.ssh:/home/developer/.ssh:cached
    environment:
      - USER=developer
    working_dir: /home/developer
    stdin_open: true
    tty: true
